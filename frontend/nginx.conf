server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 10m;

  # Sitemap is generated by the backend; proxy it so it resolves same-origin
  # at https://<domain>/sitemap.xml (the URL advertised in robots.txt).
  location = /sitemap.xml {
    proxy_pass http://backend:8000/sitemap.xml;
    proxy_set_header Host $host;
  }

  # Serve static files, fall back to index.html for React Router
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the HTML shell so meta/JS updates deploy promptly
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
    expires 0;
  }

  # Cache static assets aggressively (Vite fingerprints filenames)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}