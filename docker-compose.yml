version: "3.8"

services:
  db:
    image: postgres:16
    container_name: f1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: f1db
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [f1net]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: f1_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://f1user:f1password@db:5432/f1db
      PYTHONUNBUFFERED: "1"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-30}
      PROD: false
    ports:
      - "8010:8000"
    volumes:
      - uploads_data:/app/app/static/uploads
    depends_on: [db]
    networks:
      # Alias 'backend' so the shared nginx.conf upstream (http://backend:8000)
      # resolves in dev, where this service is named 'api' (prod names it 'backend').
      f1net:
        aliases:
          - backend

  # OpenF1 auto-fetch scheduler. Off by default in dev — enable explicitly with:
  #   docker compose -f docker-compose.dev.yml --profile scheduler up scheduler
  # For a one-off planning + fetch pass (no long-running process), run:
  #   docker compose -f docker-compose.dev.yml run --rm scheduler python -m app.scheduler --once
  scheduler:
    build:
      context: ./backend
    container_name: f1_scheduler
    restart: unless-stopped
    profiles: ["scheduler"]
    command: ["python", "-m", "app.scheduler"]
    environment:
      DATABASE_URL: postgresql+psycopg2://f1user:f1password@db:5432/f1db
      PYTHONUNBUFFERED: "1"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    volumes:
      # Live host code overlays the baked /app so backend edits need only a
      # `restart` (not a rebuild). Deps live in site-packages, so they survive.
      - ./backend:/app
    depends_on: [db]
    networks: [f1net]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8010
        VITE_APP_VERSION: ${VITE_APP_VERSION:-dev}
        VITE_SITE_ORIGIN: ${VITE_SITE_ORIGIN:-http://localhost:8081}
    container_name: f1_frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on: [api]
    networks: [f1net]

volumes:
  postgres_data:
  uploads_data:

networks:
  f1net:
